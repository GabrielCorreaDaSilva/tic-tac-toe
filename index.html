<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
    <title>Project: Tic Tac Toe</title>
</head>

<body>
    <button class="dark-light-switch">
        <svg class="icon">
            <use href="/svg/theme-light-dark.svg" />
        </svg>
    </button>
    <div class="content-wrapper">

        <h1 class="turn"></h1>
        <div class="board">
        </div>
    </div>
    <dialog class="start-game">
        <h1 class="title">Tic Tac Toe</h1>
        <hr>
        <div class="name-input-wrapper">
            <div>
                <label for="player-one-name">Player 1:</label>
                <input type="text" name="player-one-name" id="player-one-name" placeholder="Player one name"
                    value="Red">
            </div>
            <div>
                <label for="player-two-name">Player 2:</label>
                <input type="text" name="player-two-name" id="player-two-name" placeholder="Player two name"
                    value="Blue">
            </div>
        </div>
        <button class="start-button">Start Game</button>
    </dialog>
    <dialog class="result">
        <h1 class="game-result"></h1>
        <hr>
        <button class="new-game">New Game</button>
    </dialog>


</body>

</html>
